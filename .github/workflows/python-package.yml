name: Python package

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4

    - name: Install the latest version of uv and setup Python ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: |
          **/requirements*.txt
          **/uv.lock
          **/pyproject.toml
        python-version: ${{ matrix.python-version }}

    - name: Test with pytest and generate coverage report
      run: |
        uv run --frozen pytest --cov=src --cov-branch --cov-report=xml --cov-report=html:htmlcov tests

    - name: Upload coverage reports to Codecov
      if: ${{ !env.ACT }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: ${{ github.repository }}

    - name: Build distributions
      run: uv build --out-dir dist --sdist --wheel

    - name: Get the default Python version
      id: default-python-version
      run: echo "python-version=$(cat .python-version)" >> $GITHUB_OUTPUT

    - name: Release the package
      if: |
        ${{ !env.ACT }} &&
        startsWith(github.ref, 'refs/tags/v') &&
        ${{ matrix.python-version }} == steps.default-python-version.outputs.python-version
      uses: softprops/action-gh-release@v2

    - name: Minimize uv cache
      run: uv cache prune --ci
